<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="TaskFlow — Scalable Web App with Authentication & Dashboard" />
    <meta name="theme-color" content="#4f46e5" />
    <title>TaskFlow — Dashboard</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <style>
      /* Initial page load styles — before React mounts */
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: 'Inter', sans-serif;
        background-color: #f9fafb;
        color: #111827;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      /* Loading spinner shown before React loads */
      #initial-loader {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #eef2ff 0%, #ffffff 50%, #f5f3ff 100%);
        z-index: 9999;
        gap: 16px;
        transition: opacity 0.3s ease;
      }

      #initial-loader .logo {
        font-size: 48px;
        animation: pulse 1.5s ease-in-out infinite;
      }

      #initial-loader .app-name {
        font-size: 22px;
        font-weight: 700;
        color: #4f46e5;
        letter-spacing: -0.5px;
      }

      #initial-loader .spinner {
        width: 36px;
        height: 36px;
        border: 4px solid #e0e7ff;
        border-top-color: #4f46e5;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }

      #initial-loader .tagline {
        font-size: 13px;
        color: #6b7280;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }

      @keyframes pulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.12); }
      }

      /* Hide loader once React is ready */
      #initial-loader.hidden {
        opacity: 0;
        pointer-events: none;
      }

      /* Scrollbar styling */
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: #f1f5f9; }
      ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 999px; }
      ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
  </head>

  <body>
    <!-- Loading screen shown before React mounts -->
    <div id="initial-loader">
      <div class="logo">⚡</div>
      <div class="app-name">TaskFlow</div>
      <div class="spinner"></div>
      <div class="tagline">Loading your workspace...</div>
    </div>

    <!-- React mounts here -->
    <div id="root"></div>

    <!-- Hide loader once React has mounted -->
    <script>
      document.addEventListener('DOMContentLoaded', function () {
        const observer = new MutationObserver(function () {
          const root = document.getElementById('root');
          if (root && root.children.length > 0) {
            const loader = document.getElementById('initial-loader');
            if (loader) {
              loader.classList.add('hidden');
              setTimeout(() => loader.remove(), 300);
            }
            observer.disconnect();
          }
        });
        observer.observe(document.getElementById('root'), { childList: true });
      });
    </script>

    <!-- Vite entry point -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
